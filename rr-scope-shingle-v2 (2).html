<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#0a0f1a;font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100%;}
.stage{flex:1;display:flex;align-items:stretch;overflow:hidden;min-height:0;}
.panel{width:200px;flex-shrink:0;background:rgba(0,0,0,0.4);border-right:0.5px solid rgba(255,255,255,0.07);display:flex;flex-direction:column;overflow:hidden;padding:8px;}
.step-pill{display:flex;align-items:center;gap:9px;padding:10px 11px;border-radius:10px;cursor:pointer;transition:all .25s;border:1px solid transparent;-webkit-user-select:none;user-select:none;}
.step-pill:active{opacity:0.7;}
.step-pill.past{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.07);}
.step-pill.active{background:rgba(26,58,107,0.45);border-color:rgba(96,165,250,0.5);box-shadow:0 0 14px rgba(45,107,228,0.2);}
.step-pill.future{opacity:0.3;}
.step-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:all .25s;}
.step-pill.past .step-dot{background:#4ade80;}
.step-pill.active .step-dot{background:#60a5fa;box-shadow:0 0 5px #60a5fa;}
.step-pill.future .step-dot{background:rgba(255,255,255,0.15);}
.step-name{font-size:15px;font-weight:600;color:rgba(255,255,255,0.4);line-height:1.3;transition:color .25s;}
.step-pill.past .step-name{color:rgba(255,255,255,0.65);}
.step-pill.active .step-name{color:#fff;font-size:16px;}
.panel-divider{height:0.5px;background:rgba(255,255,255,0.08);margin:6px 2px;}
.panel-section{padding:6px 11px 4px;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,0.25);}
.upgrade-list{display:flex;flex-direction:column;gap:5px;padding:4px 0;}
.upg-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);transition:all .4s;}
.upg-item.pulse{background:rgba(232,119,34,0.15);border-color:rgba(232,119,34,0.5);box-shadow:0 0 16px rgba(232,119,34,0.2);animation:upgPop .5s ease .2s both;}
.upg-icon{font-size:18px;flex-shrink:0;transition:transform .3s;}
.upg-item.pulse .upg-icon{transform:scale(1.2);}
.upg-name{font-size:14px;font-weight:600;color:rgba(255,255,255,0.35);line-height:1.3;transition:color .3s;}
.upg-item.pulse .upg-name{color:#fff;}
.upg-badge{font-size:9px;font-weight:800;color:#E87722;opacity:0;transition:opacity .3s;margin-left:auto;white-space:nowrap;}
.upg-item.pulse .upg-badge{opacity:1;}
.no-upgrades{font-size:12px;color:rgba(255,255,255,0.2);padding:8px 10px;line-height:1.5;}
.image-col{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;}

.image-area{flex:1;position:relative;overflow:hidden;background:#0a0f1a;display:flex;align-items:center;justify-content:center;}
.slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .45s ease;pointer-events:none;}
.slide.visible{opacity:1;pointer-events:auto;}
.slide img{max-width:88%;max-height:88%;object-fit:contain;border-radius:14px;box-shadow:0 24px 70px rgba(0,0,0,0.6);}
.label-box{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(8,14,28,0.9);border:1px solid rgba(96,165,250,0.2);border-radius:12px;padding:10px 20px;text-align:center;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);white-space:nowrap;z-index:10;}
.label-step{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(96,165,250,0.6);margin-bottom:2px;}
.label-name{font-size:16px;font-weight:700;color:#fff;}
.label-desc{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px;}
.nav{flex-shrink:0;height:64px;background:rgba(0,0,0,0.5);border-top:0.5px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;padding:0 20px;}
.dots{display:flex;gap:5px;align-items:center;}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.1);transition:all .25s;}
.dot.past{background:rgba(74,222,128,0.45);}
.dot.active{background:#60a5fa;width:16px;border-radius:3px;}
.nav-btn{padding:10px 18px;border-radius:30px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.7);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .18s;}
.nav-btn:active{transform:scale(0.95);opacity:0.8;}
.nav-btn.primary{background:#1a3a6b;border-color:transparent;color:#fff;}
@keyframes upgPop{0%{transform:scale(1)}40%{transform:scale(1.05)}100%{transform:scale(1)}}
</style>
</head>
<body>
<div id="app">
  <div class="stage">
    <div class="panel">
      <div id="step-list" style="flex:1;display:flex;flex-direction:column;gap:5px;justify-content:center;"></div>
      <div class="panel-divider"></div>
      <div class="panel-section">Your Upgrades</div>
      <div class="upgrade-list" id="upgrade-list">
        <div class="no-upgrades">No upgrades selected</div>
      </div>
    </div>
    <div class="image-col">
      
      <div class="image-area" id="image-area"></div>
    </div>
  </div>
  <div class="label-box" id="label-box" style="position:fixed;">
    <div class="label-step" id="lbl-step"></div>
    <div class="label-name" id="lbl-name"></div>
    <div class="label-desc" id="lbl-desc"></div>
  </div>
  <div class="nav">
    <div class="dots" id="dots"></div>
    <div style="display:flex;gap:8px;">
      <button class="nav-btn" onclick="window.parent.goToAddonsFor&&window.parent.goToAddonsFor(window.parent.currentPrice||'p1')">Add-Ons</button>
      <button class="nav-btn primary" onclick="window.parent.show&&window.parent.show('s-setup')">&#9998; Setup</button>
    </div>
  </div>
</div>

let current = 0;

function buildUpgrades(upgrades) {
  const ul = document.getElementById('upgrade-list');
  if (!upgrades || upgrades.length === 0) { ul.innerHTML = '<div class="no-upgrades">No upgrades selected</div>'; return; }
  ul.innerHTML = upgrades.map(u => `<div class="upg-item" id="upg-${u.id}"><span class="upg-icon">${u.icon||'⭐'}</span><span class="upg-name">${u.name}</span><span class="upg-badge">ADDED</span></div>`).join('');
  setTimeout(() => { upgrades.forEach(u => { const el = document.getElementById('upg-'+u.id); if(el) el.classList.add('pulse'); }); }, 400);
}

function buildSlides() {
  document.getElementById('image-area').innerHTML = LAYERS.map((l,i) => `<div class="slide${i===0?' visible':''}" id="slide-${i}"><img src="${l.img}" alt="${l.name}"></div>`).join('');
}

function buildStepList() {
  document.getElementById('step-list').innerHTML = LAYERS.map((l,i) => `<div class="step-pill ${i===0?'active':'future'}" id="pill-${i}" onclick="goTo(${i})"><div class="step-dot"></div><div class="step-name">${l.name}</div></div>`).join('');
}

function buildDots() {
  document.getElementById('dots').innerHTML = LAYERS.map((l,i) => `<div class="dot ${i===0?'active':''}" id="dot-${i}"></div>`).join('');
}

function goTo(idx) {
  if (idx < 0 || idx >= LAYERS.length) return;
  current = idx;
  document.querySelectorAll('.slide').forEach((s,i) => s.classList.toggle('visible', i===idx));
  document.querySelectorAll('.step-pill').forEach((p,i) => { p.classList.remove('active','past','future'); p.classList.add(i<idx?'past':i===idx?'active':'future'); });
  document.querySelectorAll('.dot').forEach((d,i) => { d.classList.remove('active','past'); if(i<idx) d.classList.add('past'); else if(i===idx) d.classList.add('active'); });
  const l = LAYERS[idx];
  document.getElementById('lbl-step').textContent = 'STEP '+(idx+1)+' OF '+LAYERS.length;
  document.getElementById('lbl-name').textContent = l.name;
  document.getElementById('lbl-desc').textContent = l.desc;
}

function init(title, upgrades) {
  
  buildSlides(); buildStepList(); buildDots(); buildUpgrades(upgrades || []); goTo(0);
}

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'scopeInit') init(e.data.title, e.data.upgrades);
});

document.addEventListener('click', function(e) {
  if (e.target.closest('.panel') || e.target.closest('.nav') || e.target.closest('.label-box')) return;
  if (current < LAYERS.length - 1) goTo(current + 1);
});

init('Your New Roof — Step by Step', []);
</script>
